[package]
name = "ablemod"
version = "0.1.0"
edition = "2021"
description = "Convert ProTracker modules and VGM/VGZ chiptune rips to Ableton Live projects"

[[bin]]
name = "ablemod"
path = "src/main.rs"

[lib]
name = "ablemod"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
flate2 = "1"
hound = "3"
xmltree = "0.11"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
